appliance:
  repair_type_extra: When generating the QA item, keep the scope simple, do not produce an answer that requires professional help, or if the scope might includes that please be sure to mention that a professional should be consulted.  Example - Any work on a microwave dealing with internals and wires, capcitor, or magnetron must refer the owner to a professional including in the first step. Any diagnosis involving live wires must also refer to a professional in the steps.  Any work requiring inspection or replacement of refrigerants must refer to a professional in the steps. 
  repair_type: appliance
  repair_examples: refrigerators, washing machines, dryers, dishwashers, ovens, microwaves,
    icemakers, freezers (including standalone), water dispensers, toasters, air fryers,
    garbage disposals, trash compactors, wine coolers, beverage fridges, range hoods,
    cooktops (gas and electric), wall ovens, steam ovens, warming drawers, coffee makers,
    instant pots / pressure cookers, bread makers, food processors, stand mixers,
    dehumidifiers, humidifiers, portable AC units, window AC units, electric fireplaces,
    sump pumps, whole-house water filters, UV water purifiers, ice dispensers,
    smart appliance connectivity issues (Wi-Fi, app pairing), power surges damaging
    appliances, unusual noises, leaking, not turning on, error codes. (Do not focus on dishwashers)
  

electrical:
  repair_type_extra: If steps include a recommendation to replace wiring, or panel changes, refer the homeowner to a professional in step 1. Any instructions for making changes to the breaker panel should include a strong referral to a professional. Instructions involving eletrical work should always be preceded by a recommendation to consult a professional as the first step.
  repair_type: electrical
  repair_examples: outlets, circuit breakers, light switches, ceiling fans, wiring,
    dimmer switches, doorbells, security cameras, intercoms, GFCI outlets (tripping
    or not resetting), AFCI breakers, panel upgrades, subpanels, outdoor outlets,
    outdoor lighting, landscape lighting, motion sensor lights, smart switches,
    smart plugs, USB outlets, EV charger installation, generator hookups, transfer
    switches, smoke detectors, carbon monoxide detectors, whole-house surge protectors,
    attic fans (electric), bathroom exhaust fans, under-cabinet lighting, recessed
    lighting, track lighting, flickering lights, frequently tripping breakers,
    burning smell from outlet, power outage (partial), aluminum wiring concerns. Do not focus on GFCI outlets.

general:  
  repair_type_extra: When generating safety_info for this category make sure the precautions are not generic an apply to the repair type being done, for example be cautions with limbs and fingers when operating the garage door due to pinch injuries, or wear a mask when sanding drywall due to particulate inhilation hazards, or Wear knee pads to protect your joints during prolonged work on the floor, or use eye and ear protection when cutting or sanding — sawdust and debris can cause real damage.
  repair_type: general home
  repair_examples: doors, windows, drywall, flooring, painting, closet doors, attic
    stairs, stairs, railing, floorboards, countertops, cabinets, garage, garage doors,
    mailbox, side gates, automatic gates, window screens, door screens, sliding doors,
    pocket doors, barn doors, door frames, door jambs, weatherstripping, caulking,
    grout, tile (floor and wall), hardwood floor scratches, squeaky floors, baseboards,
    crown molding, window sills, window locks, door locks, deadbolts, door knobs,
    hinges, exterior siding, stucco, fascia boards, soffits, gutters, downspouts,
    roof shingles, skylights, patio doors, patio covers, pergolas, decks, fences,
    retaining walls, concrete cracks (driveway / walkway), popcorn ceiling,
    water stains on ceiling, mold or mildew, insulation, crawl space, attic vents,
    chimney (exterior), fireplace surround, built-in shelving, wall anchors/mounting

hvac:
  repair_type_extra: If steps mention gas lines or pipes they must include a referral a professional.  If steps mentioning burnt wires or capacitors they should refer the homeowner to consult a professional.  If steps suspect refrigerant problem (checking or changing), they must refer to an HVAC professional to make the diagnosis.
  repair_type: HVAC
  repair_examples: air conditioners (central), furnaces, heat pumps, thermostats,
    ductwork, AC drip pan, AC returns, vents, smells (burning, musty, chemical),
    mini-split / ductless systems, swamp coolers / evaporative coolers, radiant heat,
    baseboard heaters, boilers, hot water radiators, zone controllers, smart thermostats
    (Nest, Ecobee, etc.), air handlers, blower motors, capacitors, contactors,
    refrigerant leaks, frozen AC coils, AC not cooling, heat not turning on,
    short cycling, high energy bills, noisy operation (rattling, squealing, banging),
    poor airflow, uneven heating/cooling between rooms, dirty filters, air quality
    (dust, allergens), UV air purifiers, whole-house humidifiers/dehumidifiers,
    HRV / ERV ventilation systems, carbon monoxide concerns from furnace,
    pilot light issues, gas valve problems, condensate drain clogs

plumbing:
  repair_type_extra:  If the "tips" field contains suggestions for regular maintenance of a part or specific condition then it passes its usefulness check.  For safety_info, avoid stating things like be careful with tools or use tools safely, but it is acceptable to refer to specific hazards such as be cautious using wired power tools near water due to electrocution if necessary.
  repair_type: plumbing
  repair_examples: faucets (dripping, loose, low pressure), pipes (leaking, burst,
    corroded, banging), water heaters (tankless and tank), drains, clogs, backups,
    hot/cold water issues, frozen pipes, discolored water, rust, sewer smell,
    running toilets, toilet not flushing, toilet rocking or leaking at base,
    slow drains (sink, tub, shower), garbage disposal jams, shower pressure issues,
    showerhead replacement, bathtub caulk, hose bib / outdoor spigot, sprinkler
    system leaks, water softener issues, whole-house water filter maintenance,
    sump pump failure, sewage ejector pump, main water shut-off valve, water meter
    leaks, pressure regulator valve (PRV), expansion tank issues, recirculating
    pump, under-sink supply lines, P-trap leaks, wet bar / laundry sink, water
    hammer (banging pipes), pipe insulation, polybutylene or lead pipe concerns